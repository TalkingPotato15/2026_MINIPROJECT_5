[ConsoleAppender]
Enabled=true    ; 활성화 여부
LogLevel=INFO   ; 출력할 최하 우선순위 로그 레벨. 이 로그 레벨 이상으로 출력됨.
Date=true       ; 날짜 출력 여부
Time=true       ; 시간 출력 여부
Tag=true        ; 로그 레벨 태그 출력
LineNumber=true ; 줄 번호 출력 여부
Coloring=true   ; 콘솔 폰트 컬러링 여부
ThreadID=true   ; Thread ID 출력 여부

[FileAppender]
Enabled=false             ; 활성화 여부
LogLevel=INFO             ; 출력할 최하 우선순위 로그 레벨. 이 로그 레벨 이상으로 출력됨.
FilePath=logs             ; 로그 출력 파일 경로
RollingEnabled=false      ; 로그 출력 파일 크기 제한으로 분할 기능 여부
RollingMaxBytes=10485760  ; 로그 출력 파일 크기 제한 10MB
Date=true                 ; 날짜 출력 여부
Time=true                 ; 시간 출력 여부
Tag=true                  ; 로그 레벨 태그 출력
LineNumber=true           ; 줄 번호 출력 여부
PerComponentLogging=false ; 컴포넌트 별 폴더 분리후 로깅 여부
ThreadID=true             ; Thread ID 출력 여부

[HTMLFileAppender]
Enabled=false             ; 활성화 여부
LogLevel=INFO             ; 출력할 최하 우선순위 로그 레벨. 이 로그 레벨 이상으로 출력됨.
FilePath=logs_HTML        ; 로그 출력 파일 경로
RollingEnabled=false      ; 로그 출력 파일 크기 제한으로 분할 기능 여부
RollingMaxBytes=10485760  ; 로그 출력 파일 크기 제한 10MB
Date=true                 ; 날짜 출력 여부
Time=true                 ; 시간 출력 여부
Tag=true                  ; 로그 레벨 태그 출력
LineNumber=true           ; 줄 번호 출력 여부
PerComponentLogging=false ; 컴포넌트 별 폴더 분리후 로깅 여부
Coloring=true             ; HTML 폰트 컬러링 여부(CSS 파일)
ThreadID=true             ; Thread ID 출력 여부

[Log4nFMonitorAppender]
Enabled=false                   ; 활성화 여부
LogLevel=INFO                   ; 출력할 최하 우선순위 로그 레벨. 이 로그 레벨 이상으로 출력됨.
MonitorPath="Log4nFMonitor.exe" ; Log4nFMonitor.exe의 경로
Date=true                       ; 날짜 출력 여부
Time=true                       ; 시간 출력 여부
Tag=true                        ; 로그 레벨 태그 출력
LineNumber=true                 ; 줄 번호 출력 여부
Coloring=true                   ; 콘솔 폰트 컬러링 여부
ThreadID=true                   ; Thread ID 출력 여부

[Log4nFRemoteMonitorAppender]
Enabled=false                   ; 활성화 여부
LogLevel=INFO                   ; 출력할 최하 우선순위 로그 레벨. 이 로그 레벨 이상으로 출력됨.
IP=127.0.0.1                    ; Log4nF Remote Monitor의 IP
Port=8081                       ; Log4nF Remote Monitor의 Port
Date=true                       ; 날짜 출력 여부
Time=true                       ; 시간 출력 여부
Tag=true                        ; 로그 레벨 태그 출력
LineNumber=true                 ; 줄 번호 출력 여부
Coloring=true                   ; 콘솔 폰트 컬러링 여부
ThreadID=true                   ; Thread ID 출력 여부